<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Ladder to Kitty - Learn the Pythagorean theorem by saving kittens with the right ladder length!">
    <title>Ladder to Kitty — Pythagorean Theorem Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header Bar -->
    <header id="game-header">
        <div class="header-left">
            <div class="logo-icon">🔺</div>
            <h1>Ladder to Kitty</h1>
        </div>
        <div class="header-right">
            <!-- Lives in header -->
            <div class="header-lives" id="lives-card">
                <span class="heart-icon">❤️</span>
                <span class="lives-count" id="lives-count">1</span>
            </div>
            <div class="header-divider"></div>
            <!-- Info button with tooltip -->
            <div class="info-btn-wrap">
                <button class="icon-btn" id="info-btn" title="How to play">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="16" x2="12" y2="12" />
                        <line x1="12" y1="8" x2="12.01" y2="8" />
                    </svg>
                </button>
                <div class="info-tooltip" id="info-tooltip">
                    <div class="info-tooltip-title">💡 How to play</div>
                    <p>Choose the correct ladder length to reach Kitty.</p>
                    <p>The ladder is the slanted side of the right triangle!</p>
                </div>
            </div>
            <button class="icon-btn" id="dark-mode-btn" title="Toggle Dark Mode">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
            <button class="icon-btn" id="restart-btn" title="Restart">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 4v6h6" />
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
                </svg>
            </button>
            <button class="icon-btn" id="sound-btn" title="Toggle Sound">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Game Area -->
    <main id="game-main">
        <!-- Canvas Container -->
        <div id="canvas-container">
            <canvas id="game-canvas"></canvas>
        </div>

        <!-- Side Panel (options only) -->
        <aside id="side-panel">
            <div class="options-prompt" id="options-prompt">Choose the ladder length</div>
            <div class="options-col" id="options-row">
                <!-- Options generated by JS -->
            </div>
            <div class="hint-bar" id="hint-bar">
                <span class="hint-icon">ℹ️</span>
                <span>The ladder is the slanted side.</span>
            </div>
        </aside>
    </main>

    <!-- Feedback Overlay -->
    <div class="feedback-overlay" id="feedback-overlay">
        <div class="feedback-card" id="feedback-card">
            <!-- Filled by JS -->
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="gameover-overlay" id="gameover-overlay">
        <div class="gameover-card">
            <div class="gameover-emoji">😢</div>
            <h2>Game Over</h2>
            <p>The kitty is still stuck! But don't worry...</p>
            <button class="try-again-btn" id="try-again-btn">Try Again</button>
        </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="success-overlay">
        <div class="success-card" id="success-card">
            <!-- Filled by JS -->
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <script src="game.js"></script>
</body>

</html>
